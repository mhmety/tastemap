services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tastemap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tastemap}
      POSTGRES_DB: ${POSTGRES_DB:-tastemap}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tastemap} -d ${POSTGRES_DB:-tastemap}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
